name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Step 1: Lint Python code ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint backend
        run: ruff check backend/

  # ── Step 2: Build frontend ────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── Step 3: Build Docker image ────────────────────────────────────────────
  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [lint, build-frontend]  # only runs if lint + frontend pass
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t stock-assistant:ci .
